<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1250" viewBox="0 0 1700 1250" role="img" aria-labelledby="title desc">
  <title id="title">Service Costing RAG Program Flow</title>
  <desc id="desc">Detailed program flow for streamlit_app.py showing startup, upload processing, service costing, chat routing, structured answers, Tavily web search, FAISS retrieval, Gemini answer generation, and chat history updates.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#172033"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#f7fbfa"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <style>
      .page { fill: url(#bg); stroke: #b8c4d4; stroke-width: 1.5; }
      .title { font: 800 48px Arial, sans-serif; fill: #071126; letter-spacing: 0; }
      .sub { font: 18px Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .lane { fill: rgba(255,255,255,0.78); stroke: #c3cfdd; stroke-width: 1.5; }
      .lane-title { font: 800 22px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .box { filter: url(#shadow); stroke-width: 1.5; }
      .start { fill: #f8f4ff; stroke: #a78bfa; }
      .input { fill: #f8f4ff; stroke: #a78bfa; }
      .process { fill: #f3f8ff; stroke: #93c5fd; }
      .compute { fill: #f2fff6; stroke: #86efac; }
      .decision { fill: #fffaf0; stroke: #fbbf24; }
      .web { fill: #fff8ed; stroke: #f59e0b; }
      .answer { fill: #effffb; stroke: #5eead4; }
      .error { fill: #fff1f2; stroke: #fb7185; }
      .text { font: 17px Arial, sans-serif; fill: #111827; letter-spacing: 0; }
      .small { font: 14px Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .box-title { font: 800 19px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .arrow { fill: none; stroke: #172033; stroke-width: 2.2; marker-end: url(#arrow); }
      .dash-arrow { fill: none; stroke: #172033; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .label { font: 700 13px Arial, sans-serif; fill: #1e293b; letter-spacing: 0; }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .code { font: 13px Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect x="10" y="10" width="1680" height="1230" rx="20" class="page"/>
  <text x="850" y="58" text-anchor="middle" class="title">Service Costing RAG Program Flow</text>
  <text x="850" y="88" text-anchor="middle" class="sub">Actual execution path from streamlit_app.py, RAG pipeline, and costing helpers</text>

  <!-- Lanes -->
  <rect x="32" y="120" width="1636" height="205" rx="16" class="lane"/>
  <text x="58" y="154" class="lane-title">1. App Startup</text>
  <rect x="32" y="350" width="1636" height="238" rx="16" class="lane"/>
  <text x="58" y="384" class="lane-title">2. File Upload + Cost Calculation</text>
  <rect x="32" y="614" width="1636" height="500" rx="16" class="lane"/>
  <text x="58" y="648" class="lane-title">3. RAG Chat Routing + Answers</text>
  <rect x="32" y="1142" width="1636" height="74" rx="16" class="lane"/>
  <text x="58" y="1187" class="lane-title">Output Safety</text>

  <!-- Startup row -->
  <g transform="translate(94 178)">
    <rect x="0" y="0" width="220" height="96" rx="12" class="box start"/>
    <text x="110" y="32" text-anchor="middle" class="box-title">Start Streamlit</text>
    <text x="110" y="58" text-anchor="middle" class="small">streamlit run</text>
    <text x="110" y="78" text-anchor="middle" class="code">streamlit_app.py</text>
  </g>
  <line x1="324" y1="226" x2="390" y2="226" class="arrow"/>

  <g transform="translate(400 178)">
    <rect x="0" y="0" width="236" height="96" rx="12" class="box process"/>
    <text x="118" y="32" text-anchor="middle" class="box-title">Load Config</text>
    <text x="118" y="58" text-anchor="middle" class="small">load_dotenv()</text>
    <text x="118" y="78" text-anchor="middle" class="small">set page layout</text>
  </g>
  <line x1="646" y1="226" x2="712" y2="226" class="arrow"/>

  <g transform="translate(722 178)">
    <rect x="0" y="0" width="262" height="96" rx="12" class="box process"/>
    <text x="131" y="32" text-anchor="middle" class="box-title">Initialize Session</text>
    <text x="131" y="58" text-anchor="middle" class="small">chat_history = []</text>
    <text x="131" y="78" text-anchor="middle" class="small">tavily_search_count = 0</text>
  </g>
  <line x1="994" y1="226" x2="1060" y2="226" class="arrow"/>

  <g transform="translate(1070 178)">
    <rect x="0" y="0" width="264" height="96" rx="12" class="box input"/>
    <text x="132" y="32" text-anchor="middle" class="box-title">Render Inputs</text>
    <text x="132" y="58" text-anchor="middle" class="small">file uploader</text>
    <text x="132" y="78" text-anchor="middle" class="small">quantity input</text>
  </g>
  <line x1="1344" y1="226" x2="1410" y2="226" class="arrow"/>

  <g transform="translate(1420 178)">
    <rect x="0" y="0" width="184" height="96" rx="12" class="box answer"/>
    <text x="92" y="32" text-anchor="middle" class="box-title">Wait for User</text>
    <text x="92" y="58" text-anchor="middle" class="small">upload files</text>
    <text x="92" y="78" text-anchor="middle" class="small">or ask chat</text>
  </g>

  <!-- Upload / costing row -->
  <g transform="translate(82 420)">
    <rect x="0" y="0" width="214" height="106" rx="12" class="box input"/>
    <text x="107" y="32" text-anchor="middle" class="box-title">Upload Files?</text>
    <text x="107" y="60" text-anchor="middle" class="small">CSV and/or PDF</text>
    <text x="107" y="82" text-anchor="middle" class="small">multiple allowed</text>
  </g>
  <line x1="306" y1="473" x2="374" y2="473" class="arrow"/>

  <g transform="translate(386 397)">
    <rect x="0" y="0" width="258" height="152" rx="12" class="box process"/>
    <text x="129" y="32" text-anchor="middle" class="box-title">Parse Files</text>
    <text x="24" y="62" class="small">CSV: pandas.read_csv()</text>
    <text x="24" y="86" class="small">PDF: fitz.open()</text>
    <text x="24" y="110" class="small">Build rag_chunks from</text>
    <text x="24" y="132" class="small">rows, columns, and pages</text>
  </g>
  <line x1="654" y1="473" x2="722" y2="473" class="arrow"/>

  <g transform="translate(734 420)">
    <rect x="0" y="0" width="214" height="106" rx="12" class="box process"/>
    <text x="107" y="32" text-anchor="middle" class="box-title">Preview CSVs</text>
    <text x="107" y="60" text-anchor="middle" class="small">st.dataframe(df)</text>
    <text x="107" y="82" text-anchor="middle" class="small">show uploaded files</text>
  </g>
  <line x1="958" y1="473" x2="1026" y2="473" class="arrow"/>

  <g transform="translate(1038 398)">
    <rect x="0" y="0" width="252" height="150" rx="12" class="box decision"/>
    <text x="126" y="32" text-anchor="middle" class="box-title">Calculate Button?</text>
    <text x="126" y="62" text-anchor="middle" class="small">If no CSV:</text>
    <text x="126" y="84" text-anchor="middle" class="small">show upload error</text>
    <text x="126" y="114" text-anchor="middle" class="small">If CSV exists:</text>
    <text x="126" y="136" text-anchor="middle" class="small">calculate costs</text>
  </g>
  <line x1="1300" y1="473" x2="1368" y2="473" class="arrow"/>

  <g transform="translate(1380 397)">
    <rect x="0" y="0" width="244" height="152" rx="12" class="box compute"/>
    <text x="122" y="32" text-anchor="middle" class="box-title">Costing Engine</text>
    <text x="24" y="62" class="small">get_shipment_category()</text>
    <text x="24" y="86" class="small">calculate_total_cost()</text>
    <text x="24" y="110" class="small">factor rates: packaging,</text>
    <text x="24" y="132" class="small">sterilization, logistics...</text>
  </g>

  <!-- Chat routing row -->
  <g transform="translate(70 710)">
    <rect x="0" y="0" width="212" height="112" rx="12" class="box input"/>
    <text x="106" y="34" text-anchor="middle" class="box-title">User Question</text>
    <text x="106" y="64" text-anchor="middle" class="small">st.chat_input()</text>
    <text x="106" y="88" text-anchor="middle" class="small">append user message</text>
  </g>
  <line x1="292" y1="766" x2="344" y2="766" class="arrow"/>

  <g transform="translate(356 706)">
    <rect x="0" y="0" width="224" height="120" rx="12" class="box decision"/>
    <text x="112" y="34" text-anchor="middle" class="box-title">Service Topic?</text>
    <text x="112" y="66" text-anchor="middle" class="small">is_service_cost_question()</text>
    <text x="112" y="92" text-anchor="middle" class="small">keywords guardrail</text>
  </g>
  <line x1="590" y1="766" x2="636" y2="766" class="arrow"/>
  <text x="604" y="748" class="label">Yes</text>

  <g transform="translate(648 706)">
    <rect x="0" y="0" width="226" height="120" rx="12" class="box decision"/>
    <text x="113" y="34" text-anchor="middle" class="box-title">Need Web?</text>
    <text x="113" y="66" text-anchor="middle" class="small">should_use_web_search()</text>
    <text x="113" y="92" text-anchor="middle" class="small">location/vendor/benchmark</text>
  </g>

  <path d="M468 826 V892 H356" class="dash-arrow"/>
  <text x="480" y="858" class="label">No</text>
  <g transform="translate(174 866)">
    <rect x="0" y="0" width="226" height="92" rx="12" class="box error"/>
    <text x="113" y="32" text-anchor="middle" class="box-title">Reject Question</text>
    <text x="113" y="58" text-anchor="middle" class="small">service-cost topics only</text>
    <text x="113" y="78" text-anchor="middle" class="small">show warning</text>
  </g>

  <!-- Web path -->
  <path d="M761 706 V674 H950" class="arrow"/>
  <text x="780" y="690" class="label">Yes</text>
  <g transform="translate(962 630)">
    <rect x="0" y="0" width="250" height="112" rx="12" class="box decision"/>
    <text x="118" y="34" text-anchor="middle" class="box-title">Validate Web Query</text>
    <text x="118" y="64" text-anchor="middle" class="small">requires location and</text>
    <text x="118" y="88" text-anchor="middle" class="small">service/vendor context</text>
  </g>
  <line x1="1222" y1="686" x2="1278" y2="686" class="arrow"/>
  <g transform="translate(1290 630)">
    <rect x="0" y="0" width="260" height="112" rx="12" class="box web"/>
    <text x="130" y="34" text-anchor="middle" class="box-title">Tavily Search</text>
    <text x="130" y="64" text-anchor="middle" class="small">POST /search</text>
    <text x="130" y="88" text-anchor="middle" class="small">limit: 5 searches/session</text>
  </g>
  <path d="M1550 686 H1604 V820" class="arrow"/>
  <text x="1558" y="668" class="label">filtered web rows</text>

  <!-- Local path -->
  <path d="M874 766 H950" class="arrow"/>
  <text x="892" y="748" class="label">No</text>
  <g transform="translate(962 790)">
    <rect x="0" y="0" width="250" height="126" rx="12" class="box decision"/>
    <text x="117" y="34" text-anchor="middle" class="box-title">Structured CSV?</text>
    <text x="117" y="64" text-anchor="middle" class="small">vendor list, rates, best,</text>
    <text x="117" y="88" text-anchor="middle" class="small">comparison, factors</text>
    <text x="117" y="112" text-anchor="middle" class="small">uses uploaded CSVs</text>
  </g>

  <path d="M1087 916 V970" class="arrow"/>
  <text x="1100" y="934" class="label">Yes with table</text>
  <g transform="translate(962 978)">
    <rect x="0" y="0" width="250" height="104" rx="12" class="box compute"/>
    <text x="130" y="34" text-anchor="middle" class="box-title">Deterministic Answer</text>
    <text x="130" y="64" text-anchor="middle" class="small">calculate_uploaded_costs()</text>
    <text x="130" y="88" text-anchor="middle" class="small">build dataframe result</text>
  </g>

  <path d="M1212 853 H1278" class="arrow"/>
  <text x="1226" y="832" class="label">Fallback</text>
  <g transform="translate(1290 790)">
    <rect x="0" y="0" width="260" height="126" rx="12" class="box process"/>
    <text x="129" y="34" text-anchor="middle" class="box-title">Retrieve Context</text>
    <text x="129" y="64" text-anchor="middle" class="small">SentenceTransformer</text>
    <text x="129" y="88" text-anchor="middle" class="small">FAISS top-k chunks</text>
    <text x="129" y="112" text-anchor="middle" class="small">retrieve_uploaded_context()</text>
  </g>

  <!-- Gemini box connected from retrieval to UI -->
  <path d="M1420 916 V962" class="arrow"/>
  <g transform="translate(1290 974)">
    <rect x="0" y="0" width="260" height="86" rx="12" class="box answer"/>
    <text x="129" y="30" text-anchor="middle" class="box-title">Gemini RAG Answer</text>
    <text x="129" y="56" text-anchor="middle" class="small">GOOGLE_API_KEY + context</text>
    <text x="129" y="76" text-anchor="middle" class="small">Gemini grounded answer</text>
  </g>

  <g transform="translate(1584 820)">
    <rect x="0" y="0" width="62" height="134" rx="12" class="box answer"/>
    <text x="31" y="38" text-anchor="middle" class="box-title">UI</text>
    <text x="31" y="70" text-anchor="middle" class="small">write</text>
    <text x="31" y="94" text-anchor="middle" class="small">answer</text>
    <text x="31" y="118" text-anchor="middle" class="small">table</text>
  </g>

  <path d="M400 912 H432 V944 H1584" class="dash-arrow"/>
  <text x="500" y="934" class="label">warning/error output</text>
  <path d="M1212 1030 H1240 V936 H1584" class="arrow"/>
  <path d="M1550 1018 H1604 V954" class="arrow"/>
  <path d="M1550 853 H1584" class="arrow"/>

  <!-- Session history -->
  <path d="M1615 954 V1102 H308 V1064" class="arrow"/>
  <g transform="translate(70 1016)">
    <rect x="0" y="0" width="226" height="96" rx="12" class="box answer"/>
    <text x="113" y="32" text-anchor="middle" class="box-title">Update Chat History</text>
    <text x="113" y="60" text-anchor="middle" class="small">append assistant answer</text>
    <text x="113" y="80" text-anchor="middle" class="small">keeps session context</text>
  </g>

  <!-- Safety note -->
  <g transform="translate(332 1164)">
    <rect x="0" y="0" width="1030" height="34" rx="17" class="pill"/>
    <text x="22" y="23" class="small">Private uploads stay local for parsing, FAISS retrieval, and CSV calculations. Tavily receives only scoped search questions; Gemini receives retrieved context for RAG answers.</text>
  </g>
</svg>
